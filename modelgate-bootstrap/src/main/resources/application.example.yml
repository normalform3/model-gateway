spring:
  datasource:
    url: ${MODELGATE_MYSQL_URL}
    username: ${MODELGATE_MYSQL_USERNAME}
    password: ${MODELGATE_MYSQL_PASSWORD}
  data:
    redis:
      host: ${MODELGATE_REDIS_HOST}
      port: ${MODELGATE_REDIS_PORT}
      password: ${MODELGATE_REDIS_PASSWORD}
      database: ${MODELGATE_REDIS_DATABASE:0}

modelgate:
  provider:
    master-key: ${MODELGATE_PROVIDER_MASTER_KEY}
  mock:
    default-delay-ms: ${MODELGATE_MOCK_DELAY_MS:80}
  test-observability:
    enabled: ${MODELGATE_TEST_OBSERVABILITY_ENABLED:false}
  test-runner:
    # Starts the separately built local test runner only in development when explicitly enabled.
    auto-start: ${MODELGATE_TEST_RUNNER_AUTO_START:false}
    jar-path: ${MODELGATE_TEST_RUNNER_JAR_PATH:tools/modelgate-test-runner/target/modelgate-test-runner-0.1.0-SNAPSHOT-all.jar}
    port: ${MODELGATE_TEST_RUNNER_PORT:19090}
  rocketmq:
    enabled: ${MODELGATE_ROCKETMQ_ENABLED:true}
    endpoints: ${MODELGATE_ROCKETMQ_ENDPOINTS}
    topic: ${MODELGATE_ROCKETMQ_TOPIC:AI_USAGE_EVENT}
    producer-group: ${MODELGATE_ROCKETMQ_PRODUCER_GROUP:modelgate-usage-producer}
