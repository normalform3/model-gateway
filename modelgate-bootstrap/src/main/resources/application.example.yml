spring:
  datasource:
    url: ${MODELGATE_MYSQL_URL}
    username: ${MODELGATE_MYSQL_USERNAME}
    password: ${MODELGATE_MYSQL_PASSWORD}
  data:
    redis:
      host: ${MODELGATE_REDIS_HOST}
      port: ${MODELGATE_REDIS_PORT}
      password: ${MODELGATE_REDIS_PASSWORD}
      database: ${MODELGATE_REDIS_DATABASE:0}

modelgate:
  auth-cache:
    # All gateway instances that share Redis must use the same channel. Set an instance ID in multi-node deployments for traceability.
    invalidation-channel: ${MODELGATE_AUTH_CACHE_INVALIDATION_CHANNEL:modelgate:auth-cache:invalidate:v1}
    instance-id: ${MODELGATE_AUTH_CACHE_INSTANCE_ID:}
  console-auth:
    # Generate a BCrypt hash outside the repository. The bootstrap account cannot authenticate until this is set.
    jwt-secret: ${MODELGATE_CONSOLE_JWT_SECRET}
    bootstrap-admin-password-hash: ${MODELGATE_BOOTSTRAP_ADMIN_PASSWORD_HASH}
    # Keep this false outside a local development profile. It resets every console account to a known local password.
    development-default-credentials-enabled: ${MODELGATE_DEVELOPMENT_DEFAULT_CREDENTIALS_ENABLED:false}
    # Explicit one-time reset for a fresh local database. Never enable this for an existing environment.
    initialize-development-credentials: ${MODELGATE_INITIALIZE_DEVELOPMENT_CREDENTIALS:false}
    refresh-cookie-secure: ${MODELGATE_CONSOLE_REFRESH_COOKIE_SECURE:true}
  provider:
    master-key: ${MODELGATE_PROVIDER_MASTER_KEY}
  mock:
    default-delay-ms: ${MODELGATE_MOCK_DELAY_MS:80}
  provider-timeout:
    completion: ${MODELGATE_PROVIDER_COMPLETION_TIMEOUT:60s}
    stream-first-event: ${MODELGATE_PROVIDER_STREAM_FIRST_EVENT_TIMEOUT:30s}
    stream-idle: ${MODELGATE_PROVIDER_STREAM_IDLE_TIMEOUT:60s}
  test-observability:
    enabled: ${MODELGATE_TEST_OBSERVABILITY_ENABLED:false}
  test-runner:
    # Starts the separately built local test runner only in development when explicitly enabled.
    auto-start: ${MODELGATE_TEST_RUNNER_AUTO_START:false}
    jar-path: ${MODELGATE_TEST_RUNNER_JAR_PATH:tools/modelgate-test-runner/target/modelgate-test-runner-0.1.0-SNAPSHOT-all.jar}
    port: ${MODELGATE_TEST_RUNNER_PORT:19090}
  rocketmq:
    enabled: ${MODELGATE_ROCKETMQ_ENABLED:true}
    endpoints: ${MODELGATE_ROCKETMQ_ENDPOINTS}
    topic: ${MODELGATE_ROCKETMQ_TOPIC:AI_USAGE_EVENT}
    producer-group: ${MODELGATE_ROCKETMQ_PRODUCER_GROUP:modelgate-usage-producer}
