spring:
  application:
    name: modelgate
  datasource:
    url: ${MODELGATE_MYSQL_URL:jdbc:mysql://localhost:3306/modelgate?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MODELGATE_MYSQL_USERNAME:modelgate}
    password: ${MODELGATE_MYSQL_PASSWORD:modelgate}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: ${MODELGATE_FLYWAY_ENABLED:true}
  data:
    redis:
      host: ${MODELGATE_REDIS_HOST:localhost}
      port: ${MODELGATE_REDIS_PORT:6379}
      password: ${MODELGATE_REDIS_PASSWORD:}
      database: ${MODELGATE_REDIS_DATABASE:0}

modelgate:
  auth-cache:
    invalidation-channel: ${MODELGATE_AUTH_CACHE_INVALIDATION_CHANNEL:modelgate:auth-cache:invalidate:v1}
    instance-id: ${MODELGATE_AUTH_CACHE_INSTANCE_ID:}
  provider:
    master-key: ${MODELGATE_PROVIDER_MASTER_KEY:}
  mock:
    default-delay-ms: ${MODELGATE_MOCK_DELAY_MS:80}
  test-observability:
    enabled: ${MODELGATE_TEST_OBSERVABILITY_ENABLED:false}
  test-runner:
    auto-start: ${MODELGATE_TEST_RUNNER_AUTO_START:false}
    jar-path: ${MODELGATE_TEST_RUNNER_JAR_PATH:tools/modelgate-test-runner/target/modelgate-test-runner-0.1.0-SNAPSHOT-all.jar}
    port: ${MODELGATE_TEST_RUNNER_PORT:19090}
  quota:
    default-max-output-tokens: ${MODELGATE_DEFAULT_MAX_OUTPUT_TOKENS:512}
    request-ttl-seconds: ${MODELGATE_REQUEST_TTL_SECONDS:300}
  rocketmq:
    enabled: ${MODELGATE_ROCKETMQ_ENABLED:false}
    endpoints: ${MODELGATE_ROCKETMQ_ENDPOINTS:}
    topic: ${MODELGATE_ROCKETMQ_TOPIC:AI_USAGE_EVENT}
    producer-group: ${MODELGATE_ROCKETMQ_PRODUCER_GROUP:modelgate-usage-producer}

server:
  port: ${MODELGATE_SERVER_PORT:8080}
