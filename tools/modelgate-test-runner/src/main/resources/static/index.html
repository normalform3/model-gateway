<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ModelGate Test Runner</title>
  <style>
    :root{--ink:#d9e7ed;--muted:#82a1ad;--line:#25414c;--panel:#10252d;--deep:#07171d;--blue:#53bfd9;--lime:#b3d97a;--warn:#ffc278;--bad:#f4867c;font-family:"Iowan Old Style","Songti SC",serif;background:var(--deep);color:var(--ink)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 78% 0,#193f4e 0,transparent 31rem),linear-gradient(120deg,#07171d,#0b2028)}main{max-width:1420px;margin:auto;padding:28px}.mast{display:flex;justify-content:space-between;gap:24px;align-items:end;border-bottom:1px solid var(--line);padding-bottom:22px}.mast p{color:var(--blue);font:700 11px/1.2 ui-monospace,monospace;letter-spacing:.2em;margin:0 0 8px}.mast h1{font-size:34px;letter-spacing:-.04em;margin:0}.mast small{color:var(--muted);max-width:430px;display:block;line-height:1.5}.grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-top:22px}.panel{background:linear-gradient(145deg,#112a34,#0d2028);border:1px solid var(--line);box-shadow:0 20px 50px #0004;padding:20px}.panel h2{font-size:16px;margin:0 0 15px}.step{font:700 11px ui-monospace,monospace;color:var(--blue);letter-spacing:.12em}.row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.row.three{grid-template-columns:repeat(3,minmax(0,1fr))}label{display:grid;gap:6px;color:var(--muted);font-size:12px}input,select{background:#07171d;border:1px solid #355664;color:var(--ink);padding:9px;border-radius:3px;font:13px ui-monospace,monospace}input:focus,select:focus{outline:1px solid var(--blue)}button{border:1px solid #427784;background:#153b46;color:#e1f6fb;padding:9px 14px;font-weight:700;cursor:pointer;border-radius:3px}button.primary{background:var(--lime);border-color:var(--lime);color:#162015}button.danger{background:#552b30;border-color:#a45758}.actions{display:flex;gap:9px;align-items:end;margin-top:14px}.callers{display:grid;gap:7px;margin-top:14px;max-height:230px;overflow:auto}.caller{display:flex;gap:10px;align-items:center;border:1px solid #294651;padding:9px;background:#0a1b21;font-size:13px}.caller small{color:var(--muted);margin-left:auto;font-family:ui-monospace,monospace}.hidden{display:none}.wide{grid-column:1/-1}.status{margin-top:18px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.metric{border:1px solid var(--line);padding:11px;background:#081a20}.metric span{color:var(--muted);font:11px ui-monospace,monospace;display:block}.metric strong{display:block;font:700 22px ui-monospace,monospace;margin-top:7px}.log{white-space:pre-wrap;font:12px/1.6 ui-monospace,monospace;color:#b4c9d1;background:#061217;border:1px solid #1e3b45;padding:14px;min-height:130px;overflow:auto}.note{color:var(--muted);line-height:1.5;font-size:12px;margin:10px 0 0}@media(max-width:850px){.grid{grid-template-columns:1fr}.row,.row.three,.metrics{grid-template-columns:1fr 1fr}.mast{align-items:start;flex-direction:column}}@media(max-width:500px){main{padding:14px}.row,.row.three,.metrics{grid-template-columns:1fr}}
  </style>
</head>
<body><main>
  <header class="mast"><div><p>LOCAL / MOCK-ONLY / MEMBER-ATTRIBUTED</p><h1>ModelGate Test Runner</h1></div><small>独立本地执行器。它仅请求网关的开发期测试契约，短期 Key 只保留在当前 Runner 内存。</small></header>
  <section class="grid">
    <form id="config" class="panel"><div class="step">01 · GATEWAY</div><h2>调用场景</h2>
      <div class="row"><label class="wide">网关地址<input id="gateway" required value="http://localhost:8080"></label><label>Mock 模型<select id="model" required></select></label><label>响应模式<select id="mockMode"><option value="normal">normal</option><option value="slow">slow</option><option value="429">429</option><option value="500">500</option><option value="stream_break">stream_break</option><option value="usage_missing">usage_missing</option></select></label></div>
      <div class="row three"><label>延迟 ms<input id="delayMs" type="number" min="0" value="80"></label><label>输入 Token<input id="inputTokens" type="number" min="1" value="64"></label><label>输出 Token<input id="outputTokens" type="number" min="1" value="32"></label><label>max_tokens<input id="maxTokens" type="number" min="1" value="128"></label><label>总请求数<input id="totalRequests" type="number" min="1" value="20"></label><label>并发<input id="concurrency" type="number" min="1" value="5"></label><label>爬坡 ms<input id="rampUpMs" type="number" min="0" value="0"></label><label>类型<select id="stream"><option value="false">普通 JSON</option><option value="true">SSE 流式</option></select></label></div>
      <div class="step" style="margin-top:22px">02 · CALLERS</div><h2>开发者调用人</h2>
      <div class="row"><label>选择方式<select id="selectionMode"><option value="EXPLICIT">手动选择</option><option value="AUTO">自动选择（稳定顺序）</option></select></label><label id="autoBox" class="hidden">自动人数<input id="autoCount" type="number" min="1" value="2"></label></div>
      <div id="callers" class="callers"><span class="note">先加载 Mock 模型与合格开发成员。</span></div>
      <div class="actions"><button type="button" id="load">加载环境</button><button class="primary" type="submit">开始测试</button><button class="danger" id="stop" type="button">停止</button></div><p class="note">只有拥有该 Mock 模型授权且个人额度为正的开发成员可参与。请求按成员轮询均分；结束时测试 Key 自动停用。</p>
    </form>
    <section class="panel status"><div class="step">03 · LIVE RESULT</div><h2>运行状态</h2><div id="metrics" class="metrics"></div><h3 style="margin:20px 0 9px;font-size:13px">网关结算与错误</h3><pre id="log" class="log">尚未开始。</pre></section>
  </section>
</main><script>
const $=id=>document.getElementById(id), getVal=id=>$(id).value, selected=()=>[...document.querySelectorAll('input[name=caller]:checked')].map(x=>Number(x.value));let timer,settlementDeadline=0;
const api=async(path,opt={})=>{const r=await fetch(path,opt);const b=await r.json();if(!r.ok)throw Error(b.error||'Request failed');return b};
function renderCallers(items){$('callers').innerHTML=items.length?items.map(x=>`<label class="caller"><input name="caller" type="checkbox" value="${x.memberId}" checked><b>${x.memberName}</b><small>${x.teamName} · ${x.availableTokens} tokens · #${x.memberId}</small></label>`).join(''):'<span class="note">没有满足模型授权和额度条件的开发成员。</span>'}
async function load(){try{const gateway=getVal('gateway');const models=await api('/api/mock-models?gatewayBaseUrl='+encodeURIComponent(gateway));$('model').innerHTML=models.items.map(x=>`<option value="${x.modelName}">${x.modelName}</option>`).join('');await loadCallers()}catch(e){log(e.message)}}
async function loadCallers(){try{const b=await api('/api/callers?gatewayBaseUrl='+encodeURIComponent(getVal('gateway'))+'&model='+encodeURIComponent(getVal('model')));renderCallers(b.items)}catch(e){log(e.message)}}
function log(value){$('log').textContent=typeof value==='string'?value:JSON.stringify(value,null,2)}
function metrics(data={}){const m=data.metrics||{};const values=[['状态',data.state||'IDLE'],['成功',m.success||0],['失败',m.failed||0],['取消',m.cancelled||0],['P50 ms',m.p50Ms||0],['P95 ms',m.p95Ms||0],['SSE 首 token P95',m.firstTokenP95Ms||0],['账单待结算',data.gateway?.pendingBillingRecords??'-']];$('metrics').innerHTML=values.map(([k,v])=>`<div class="metric"><span>${k}</span><strong>${v}</strong></div>`).join('')}
async function poll(){try{const s=await api('/api/status');metrics(s);const pending=s.gateway?.pendingBillingRecords||0;if(s.state==='COMPLETE'&&pending>0&&!settlementDeadline)settlementDeadline=Date.now()+30000;const waiting=s.state==='RUNNING'||s.state==='STOPPING'||(pending>0&&Date.now()<settlementDeadline);log({errors:s.metrics?.errors||{},perDeveloper:s.metrics?.members||{},gateway:s.gateway,settlement:pending>0?(waiting?'等待异步账单结算':'30 秒观察窗口结束，仍待结算'):'已结算',completionError:s.completionError});if(waiting)timer=setTimeout(poll,1000)}catch(e){log(e.message)}}
$('load').onclick=load;$('model').onchange=loadCallers;$('selectionMode').onchange=()=>{$('autoBox').classList.toggle('hidden',getVal('selectionMode')!=='AUTO')};
$('config').onsubmit=async e=>{e.preventDefault();try{const total=Number(getVal('totalRequests'));const ids=selected();if(getVal('selectionMode')==='EXPLICIT'&&total<ids.length)throw Error('总请求数不能少于参与开发者人数。');const body={gatewayBaseUrl:getVal('gateway'),model:getVal('model'),selectionMode:getVal('selectionMode'),memberIds:ids,autoCount:Number(getVal('autoCount')),stream:getVal('stream')==='true',mockMode:getVal('mockMode'),delayMs:Number(getVal('delayMs')),inputTokens:Number(getVal('inputTokens')),outputTokens:Number(getVal('outputTokens')),maxTokens:Number(getVal('maxTokens')),totalRequests:total,concurrency:Number(getVal('concurrency')),rampUpMs:Number(getVal('rampUpMs'))};const s=await api('/api/start',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});metrics(s);log(s);settlementDeadline=0;clearTimeout(timer);poll()}catch(e){log(e.message)}};
$('stop').onclick=async()=>{try{const s=await api('/api/stop',{method:'POST'});metrics(s);log(s);poll()}catch(e){log(e.message)}};load();
</script></body></html>
